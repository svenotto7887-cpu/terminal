services:
  - type: web
    name: terminal-backend
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SEI_NETWORK
        value: testnet
      - key: SEI_RPC_URL
        value: https://evm-rpc-testnet.sei-apis.com

  - type: web
    name: terminal-frontend
    runtime: static
    buildCommand: npm install && npm run build --workspace=frontend
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: postgres
    plan: starter
    version: 15
    ipAllowList: []

  - name: redis
    plan: starter
    version: 7
    ipAllowList: []
