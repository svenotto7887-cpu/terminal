services:
  # Backend API Server - Native Node.js
  - type: web
    name: terminal-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build --workspace=backend
    startCommand: node backend/dist/index.js
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  # Frontend Static Site
  - type: static
    name: terminal-frontend
    plan: starter
    buildCommand: npm install && npm run build --workspace=frontend
    staticPublishPath: frontend/dist
    routes:
      - path: /api/*
        destination: https://terminal-backend-[auto].onrender.com/api/*
      - path: /socket.io/*
        destination: https://terminal-backend-[auto].onrender.com/socket.io/*
      - path: /*
        destination: /index.html

databases:
  - name: postgres
    plan: starter
    ipAllowList: []

  - name: redis
    plan: starter
    ipAllowList: []
