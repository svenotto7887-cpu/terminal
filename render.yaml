services:
  # Backend API Server
  - type: web
    name: terminal-backend
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  # Frontend Static Site
  - type: static
    name: terminal-frontend
    plan: starter
    buildCommand: npm install && npm run build --workspace=frontend
    staticPublishPath: frontend/dist
    routes:
      - path: /*
        destination: /index.html

databases:
  - name: postgres
    plan: starter
    version: 15

  - name: redis
    plan: starter
    version: 7
    ipAllowList: []
